<mat-form-field class="example-form-field">
  <mat-label>Clearable input</mat-label>
  <input matInput type="text" [(ngModel)]="value">
  @if (value()) {
    <button matSuffix matIconButton aria-label="Clear" (click)="value.set('')">
      <mat-icon>close</mat-icon>
    </button>
  }
</mat-form-field>
